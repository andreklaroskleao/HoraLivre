<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap - HoraLivre</title>

  <link rel="stylesheet" href="./assets/css/global.css">
  <link rel="stylesheet" href="./assets/css/components.css">
</head>
<body>
  <main class="center-page">
    <section class="card auth-card">
      <span class="badge">HoraLivre</span>
      <h1>Inicialização da base</h1>
      <p class="muted">
        Este utilitário cria a base inicial do Firestore para o HoraLivre.
      </p>

      <div class="stack">
        <button class="button primary" id="run-bootstrap-button" type="button">
          Criar estrutura inicial
        </button>
        <pre id="bootstrap-output" class="card" style="white-space: pre-wrap;"></pre>
      </div>
    </section>
  </main>

  <script type="module">
    import { bootstrapHoraLivreBase } from './assets/js/services/bootstrap-service.js';

    const button = document.getElementById('run-bootstrap-button');
    const output = document.getElementById('bootstrap-output');

    button.addEventListener('click', async () => {
      output.textContent = 'Executando bootstrap do HoraLivre...';

      try {
        const results = await bootstrapHoraLivreBase();

        const lines = results.map((item) => {
          return `${item.id} -> ${item.created ? 'criado' : 'já existia'}`;
        });

        output.textContent = [
          'Bootstrap concluído com sucesso.',
          '',
          ...lines
        ].join('\n');
      } catch (error) {
        console.error(error);
        output.textContent = `Erro ao executar bootstrap: ${error.message}`;
      }
    });
  </script>
</body>
</html>
